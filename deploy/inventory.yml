all:
  hosts:
    prod:
      ansible_host: "{{ lookup('ansible.builtin.env', 'SERVER_PROD') }}"
      ansible_user: "{{ lookup('ansible.builtin.env', 'SERVER_PROD_USER') | default('root', true) }}"
      ansible_ssh_private_key_file: "{{ lookup('ansible.builtin.env', 'SSH_PRIVATE_KEY') }}"
      ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
      project: "{{ lookup('ansible.builtin.env', 'SERVER_PROD_PROJECT_DIR') | default('/root/traffic-data-web-app', true) }}"
