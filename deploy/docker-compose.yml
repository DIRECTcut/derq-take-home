services:
  postgres:
    image: postgres:16-alpine
    container_name: traffic-data-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DEPLOY_POSTGRES_DB:-traffic_data}
      POSTGRES_USER: ${DEPLOY_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${DEPLOY_POSTGRES_PASSWORD:-postgres}
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEPLOY_POSTGRES_USER:-postgres} -d ${DEPLOY_POSTGRES_DB:-traffic_data}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: ${DEPLOY_IMAGE:-ghcr.io/example/traffic-data:latest}
    container_name: traffic-data-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMIN_JWT_SECRET: ${DEPLOY_ADMIN_JWT_SECRET:-super-secret-admin-key-for-local-dev-32}
      ADMIN_USERNAME: ${DEPLOY_ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${DEPLOY_ADMIN_PASSWORD:-local-admin-password}
      DATABASE_URL: postgres://${DEPLOY_POSTGRES_USER:-postgres}:${DEPLOY_POSTGRES_PASSWORD:-postgres}@postgres:5432/${DEPLOY_POSTGRES_DB:-traffic_data}
      DATABASE_POOL_CONNECTION_TIMEOUT_MS: ${DEPLOY_DATABASE_POOL_CONNECTION_TIMEOUT_MS:-10000}
      DATABASE_POOL_MAX: ${DEPLOY_DATABASE_POOL_MAX:-10}
      FRONTEND_DIST_DIR: /app/frontend/dist
      PORT: 3000
    ports:
      - "${DEPLOY_APP_PORT:-3000}:3000"

volumes:
  postgres_data:
