services:
  postgres:
    image: postgres:16-alpine
    container_name: traffic-data-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DEPLOY_POSTGRES_DB:-traffic_data}
      POSTGRES_USER: ${DEPLOY_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${DEPLOY_POSTGRES_PASSWORD:-postgres}
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEPLOY_POSTGRES_USER:-postgres} -d ${DEPLOY_POSTGRES_DB:-traffic_data}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgrest:
    image: postgrest/postgrest:v14.14
    container_name: traffic-data-postgrest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI: ${DEPLOY_POSTGREST_DB_URI:-postgres://authenticator:localdev_authenticator_password@postgres:5432/traffic_data}
      PGRST_DB_SCHEMAS: api
      PGRST_DB_ANON_ROLE: ${DEPLOY_POSTGREST_ANON_ROLE:-web_anon}
      PGRST_JWT_SECRET: ${DEPLOY_POSTGREST_JWT_SECRET:-super-secret-admin-key-for-local-dev-32}
      PGRST_OPENAPI_MODE: follow-privileges
      PGRST_SERVER_PORT: 3000
    ports:
      - "${DEPLOY_POSTGREST_PORT:-3001}:3000"

  api:
    image: ${DEPLOY_IMAGE:-ghcr.io/example/traffic-data:latest}
    container_name: traffic-data-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${DEPLOY_POSTGRES_USER:-postgres}:${DEPLOY_POSTGRES_PASSWORD:-postgres}@postgres:5432/${DEPLOY_POSTGRES_DB:-traffic_data}
      FRONTEND_DIST_DIR: /app/frontend/dist
      PORT: 3000
      POSTGREST_BASE_URL: ${DEPLOY_PUBLIC_POSTGREST_URL:-http://127.0.0.1:3001}
      POSTGREST_JWT_SECRET: ${DEPLOY_POSTGREST_JWT_SECRET:-super-secret-admin-key-for-local-dev-32}
      POSTGREST_ANON_ROLE: ${DEPLOY_POSTGREST_ANON_ROLE:-web_anon}
      POSTGREST_ADMIN_ROLE: ${DEPLOY_POSTGREST_ADMIN_ROLE:-traffic_admin}
    ports:
      - "${DEPLOY_APP_PORT:-3000}:3000"

volumes:
  postgres_data:
