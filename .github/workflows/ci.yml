name: CI

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Start runtime dependencies
        run: docker compose up -d postgres postgrest

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Run backend feature tests
        run: npm run test:feature
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:55432/traffic_data
          POSTGREST_BASE_URL: http://localhost:3001
          POSTGREST_JWT_SECRET: super-secret-admin-key-for-local-dev-32

      - name: Run frontend tests
        run: npm run test
        working-directory: frontend

      - name: Build application image without publishing
        run: docker build -f backend/Dockerfile .

      - name: Stop runtime dependencies
        if: always()
        run: docker compose down -v
