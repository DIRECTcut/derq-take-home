services:
  postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - max_connections=${PG_MAX_CONNECTIONS:-100}
      - -c
      - shared_buffers=${PG_SHARED_BUFFERS:-128MB}
      - -c
      - work_mem=${PG_WORK_MEM:-4MB}
      - -c
      - maintenance_work_mem=${PG_MAINTENANCE_WORK_MEM:-64MB}
      - -c
      - effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-512MB}
      - -c
      - checkpoint_completion_target=${PG_CHECKPOINT_COMPLETION_TARGET:-0.9}
      - -c
      - wal_buffers=${PG_WAL_BUFFERS:-4MB}
    environment:
      POSTGRES_DB: traffic_data
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    shm_size: ${PG_SHM_SIZE:-256m}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d traffic_data"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-super-secret-admin-key-for-local-dev-32}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-local-admin-password}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/traffic_data
      DATABASE_POOL_CONNECTION_TIMEOUT_MS: ${DATABASE_POOL_CONNECTION_TIMEOUT_MS:-10000}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      FRONTEND_DIST_DIR: /app/frontend/dist
      PORT: "3000"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
